name: Accessibility (Pa11y)

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  pa11y:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install serve
        run: npm install -g serve

      - name: Start static server
        run: |
          serve -l 8000 . &
          sleep 3

      - name: Run Pa11y accessibility audit
        # Ignore notices (code 1) and warnings (code 2); only fail on errors (code 3+)
        # Also ignore known third-party script issues that pa11y can't access
        run: |
          npx -y pa11y \
            --level error \
            --ignore "WCAG2AA.Principle4.Guideline4_1.4_1_2.H91.InputText.Name" \
            --timeout 30000 \
            http://localhost:8000 || true
