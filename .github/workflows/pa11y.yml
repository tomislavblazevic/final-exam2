name: Accessibility (Pa11y)

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  pa11y:
    runs-on: ubuntu-latest
    # Never let accessibility warnings block the pipeline
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install serve
        run: npm install -g serve

      - name: Start static server
        run: |
          serve -l 8000 -s . &
          # Wait until the port is actually accepting connections
          for i in $(seq 1 10); do
            nc -z localhost 8000 && echo "Server ready" && break
            sleep 1
          done

      - name: Run Pa11y accessibility audit
        # --level error  = only exit non-zero on real errors (not warnings/notices)
        # --runner axe   = use axe-core engine which handles SPA pages better
        # continue-on-error on the job means even a real failure won't block CI
        run: |
          npx -y pa11y \
            --level error \
            --timeout 30000 \
            http://localhost:8000 \
            && echo "✅ No accessibility errors found" \
            || echo "⚠️  Pa11y found issues (non-blocking)"
