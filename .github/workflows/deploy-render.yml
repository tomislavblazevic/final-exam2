name: Deploy server to Render

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Verify server dependencies install cleanly
        working-directory: ./server
        run: npm install --prefer-offline

      - name: Trigger Render deploy hook (if configured)
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "ℹ️  RENDER_DEPLOY_HOOK_URL not set — Render auto-deploys via render.yaml."
          else
            curl -fsSL -X POST "$RENDER_DEPLOY_HOOK_URL"
            echo "✅ Render deploy triggered"
          fi
