name: Deploy server to Render

on:
  push:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install & verify server dependencies
        working-directory: ./server
        run: npm ci

      - name: Trigger Render deploy hook (if configured)
        # This step is optional — it only runs when the secret is set.
        # To enable: add RENDER_DEPLOY_HOOK_URL to GitHub repo secrets
        # (Render Dashboard → your service → Settings → Deploy Hook)
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "ℹ️  RENDER_DEPLOY_HOOK_URL secret not set — skipping deploy trigger."
            echo "   Render auto-deploys from GitHub anyway via render.yaml."
          else
            curl -fsSL -X POST "$RENDER_DEPLOY_HOOK_URL"
            echo "✅ Render deploy triggered"
          fi
