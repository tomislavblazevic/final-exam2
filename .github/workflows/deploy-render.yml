name: Deploy server to Render

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install & verify server dependencies
        working-directory: ./server
        run: npm ci

      - name: Trigger Render deploy hook
        # Set RENDER_DEPLOY_HOOK_URL in GitHub repo secrets:
        # Settings → Secrets → Actions → New secret
        # Get the URL from: Render Dashboard → your service → Settings → Deploy Hook
        if: ${{ secrets.RENDER_DEPLOY_HOOK_URL != '' }}
        run: |
          curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "✅ Render deploy triggered"
