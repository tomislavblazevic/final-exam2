<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Play-Off Audio-Video Chat</title>
  <link rel="stylesheet" href="./video.css">
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#1e3c72" />
  <link rel="apple-touch-icon" href="./assets/icon-192.png" />
  <link rel="icon" type="image/x-icon" href="./play-off.ico" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      --text-main: #fff;
      --text-muted: rgba(255,255,255,0.7);
      --panel-bg: rgba(0,0,0,0.4);
      --panel-border: rgba(255,255,255,0.2);
      --box-shadow: rgba(0,0,0,0.3);
      --video-bg: #000;
      --label-bg: rgba(0,0,0,0.7);
      --label-text: #fff;
      --member-bg: rgba(255,255,255,0.1);
      --msg-box-bg: rgba(0,0,0,0.3);
      --input-bg: rgba(255,255,255,0.08);
      --input-border: rgba(255,255,255,0.2);
      --input-placeholder: rgba(255,255,255,0.5);
      --scroll-track: rgba(255,255,255,0.1);
      --scroll-thumb: rgba(255,255,255,0.3);
      --scroll-thumb-hover: rgba(255,255,255,0.5);
    }

    .theme-light {
      --bg-gradient: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
      --text-main: #0c4a6e;
      --text-muted: rgba(12, 74, 110, 0.7);
      --panel-bg: rgba(255, 255, 255, 0.85);
      --panel-border: rgba(14, 165, 233, 0.2);
      --box-shadow: rgba(14, 165, 233, 0.1);
      --video-bg: #e0e0e0;
      --label-bg: rgba(255, 255, 255, 0.95);
      --label-text: #0ea5e9;
      --member-bg: rgba(14, 165, 233, 0.05);
      --msg-box-bg: rgba(255, 255, 255, 0.9);
      --input-bg: rgba(255, 255, 255, 0.8);
      --input-border: rgba(14, 165, 233, 0.3);
      --input-placeholder: rgba(12, 74, 110, 0.4);
      --scroll-track: rgba(14, 165, 233, 0.05);
      --scroll-thumb: rgba(14, 165, 233, 0.2);
      --scroll-thumb-hover: rgba(14, 165, 233, 0.4);
    }

    * {
      box-sizing: border-box;
    }

    button {
      overflow: visible;
      word-wrap: break-word;
      white-space: normal;
    }
    
    button::-moz-focus-inner {
      border: 0;
      padding: 0;
    }

    body {
      background: var(--bg-gradient);
      margin: 0;
      padding: 15px;
      font-family: 'Inter', sans-serif;
      color: var(--text-main);
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }
    
    main {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    header {
      text-align: center;
      margin-bottom: 20px;
      position: relative;
    }
    
    header img {
      height: 50px;
      width: auto;
    }
    
    header h1 {
      margin: 8px 0;
      font-size: clamp(1.5rem, 5vw, 2.5rem);
    }
    
    header p {
      color: var(--text-muted);
      margin: 5px 0;
      font-size: clamp(0.9rem, 3vw, 1rem);
    }

    .theme-toggle {
      position: absolute;
      right: 0;
      top: 0;
      background: var(--panel-border);
      border: none;
      color: var(--text-main);
      font-size: 1.2rem;
      cursor: pointer;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }
    .theme-toggle:hover {
      transform: scale(1.1);
      background: var(--scroll-thumb);
    }

    .chat-section {
      margin-top: 20px;
      padding: clamp(15px, 5vw, 20px);
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      background: var(--panel-bg);
      box-shadow: 0 8px 32px var(--box-shadow);
      transition: all 0.3s;
    }

    .chat-section h2 {
      margin-top: 0;
      color: var(--text-main);
      font-size: clamp(1.2rem, 4vw, 1.5rem);
      margin-bottom: 15px;
    }

  .video-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;

    gap: 20px;
    margin-bottom: 20px;

    width: 100%;
}

    .local-video-wrapper {
    position: relative;

    flex: 1 1 420px;

    min-width: 320px;
    max-width: 700px;

    aspect-ratio: 16 / 9;

    background: var(--video-bg);
    border-radius: 12px;
    overflow: hidden;

    border: 3px solid #4CAF50;
}

    .local-video-wrapper video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .local-video-label {
      position: absolute;
      bottom: 8px;
      left: 8px;
      background: rgba(0,0,0,0.8);
      color: #4CAF50;
      padding: 5px 10px;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: bold;
    }

    #remote-videos {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      flex: 1;
      justify-content: center;
      align-items: flex-start;
    }

   .remote-video-wrapper {
    position: relative;

    flex: 1 1 420px;

    min-width: 320px;
    max-width: 700px;

    aspect-ratio: 16 / 9;

    background: var(--video-bg);
    border-radius: 12px;
    overflow: hidden;

    border: 2px solid var(--panel-border);
}

    .remote-video-wrapper video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .remote-video-label {
      position: absolute;
      bottom: 6px;
      left: 6px;
      background: var(--label-bg);
      color: var(--label-text);
      padding: 4px 8px;
      border-radius: 3px;
      font-size: 0.75rem;
      font-weight: bold;
    }

    .media-controls {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .media-controls button {
      background: #2196F3;
      color: #fff;
      padding: 10px 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s;
      font-size: clamp(0.8rem, 2vw, 0.95rem);
      white-space: normal;
      word-wrap: break-word;
    }

    .media-controls button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(33,150,243,0.4);
    }

    .media-controls button:active {
      transform: translateY(0);
    }

    #toggle-camera {
      background: #4CAF50;
    }

    #call-button {
      background: #FF9800;
    }

    #end-call-button {
      background: #f44336;
    }

    #call-status {
      color: #4CAF50;
      display: flex;
      align-items: center;
      font-weight: bold;
      font-size: 0.9rem;
    }

    .members-section {
      margin-bottom: 20px;
      padding: 15px;
      background: var(--member-bg);
      border-radius: 8px;
    }

    .members-section h3 {
      margin-top: 0;
      margin-bottom: 10px;
      color: var(--text-main);
      font-size: 1rem;
    }

    .members-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .member {
      padding: 6px 12px;
      background: var(--member-bg);
      border-radius: 20px;
      font-size: 0.9rem;
      border: 1px solid var(--panel-border);
    }

    .messages {
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      padding: 12px;
      height: 200px;
      overflow-y: auto;
      margin-bottom: 12px;
      background: var(--msg-box-bg);
      font-size: 0.9rem;
    }

    .message {
      margin-bottom: 10px;
      padding: 8px;
      border-radius: 6px;
      word-wrap: break-word;
    }

    .message.left {
      background: rgba(33,150,243,0.2);
      border-left: 3px solid #2196F3;
    }

    .message.right {
      background: rgba(76,175,80,0.2);
      border-left: 3px solid #4CAF50;
      text-align: right;
    }

    .message-form {
      display: flex;
      gap: 8px;
      position: relative;
    }

    .emoji-btn {
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 6px;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 0 10px;
      transition: background 0.2s;
      color: var(--text-main);
      flex-shrink: 0;
    }

    .emoji-btn:hover {
      background: var(--panel-border);
    }

    .emoji-picker {
      position: absolute;
      bottom: 110%;
      left: 0;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      padding: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      width: 250px;
      box-shadow: 0 4px 15px var(--box-shadow);
      z-index: 100;
      transition: opacity 0.2s;
    }

    .emoji-picker.hidden {
      display: none;
    }

    .emoji-picker span {
      font-size: 1.5rem;
      cursor: pointer;
      padding: 5px;
      border-radius: 4px;
      transition: background 0.2s;
    }

    .emoji-picker span:hover {
      background: var(--panel-border);
    }

    .message-form__input {
      flex: 1;
      min-width: 0;
      padding: 10px 12px;
      border-radius: 6px;
      border: 1px solid var(--input-border);
      background: var(--input-bg);
      color: var(--text-main);
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
    }

    .message-form__input::placeholder {
      color: var(--input-placeholder);
    }

    .message-form__button {
      background: #2196F3;
      color: #fff;
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .message-form__button:hover {
      background: #1976D2;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(33,150,243,0.4);
    }

    .message-form__button:active {
      transform: translateY(0);
    }

    /* Scrollbar styling */
    .messages::-webkit-scrollbar {
      width: 6px;
    }

    .messages::-webkit-scrollbar-track {
      background: var(--scroll-track);
      border-radius: 3px;
    }

    .messages::-webkit-scrollbar-thumb {
      background: var(--scroll-thumb);
      border-radius: 3px;
    }

    .messages::-webkit-scrollbar-thumb:hover {
      background: var(--scroll-thumb-hover);
    }

    /* Mobile responsiveness */
    @media (max-width: 768px) {
      body {
        padding: 10px;
      }

      header {
        margin-bottom: 15px;
      }

      header img {
        height: 40px;
      }

      .chat-section {
        padding: 12px;
      }

      .video-container {
        gap: 8px;
        margin-bottom: 15px;
      }

      .local-video-wrapper {
        max-width: 120px;
        min-width: 100px;
      }

      .remote-video-wrapper {
        max-width: 100%;
        min-width: 150px;
      }

      .media-controls {
        gap: 6px;
      }

      .media-controls button {
        padding: 8px 10px;
        font-size: 0.75rem;
      }

      .messages {
        height: 150px;
        font-size: 0.85rem;
      }

      .message-form__input,
      .message-form__button {
        font-size: 0.9rem;
        padding: 8px 10px;
      }
    }

    @media (max-width: 480px) {
      header h1 {
        font-size: 1.5rem;
      }

      header p {
        font-size: 0.85rem;
      }

      .chat-section {
        padding: 10px;
      }

      .chat-section h2 {
        font-size: 1.1rem;
        margin-bottom: 12px;
      }

      .video-container {
        gap: 6px;
        margin-bottom: 12px;
      }

      .local-video-wrapper {
        max-width: 100px;
        min-height: auto;
      }

      .remote-video-wrapper {
        max-width: 100%;
      }

      .media-controls {
        gap: 5px;
      }

      .media-controls button {
        padding: 7px 8px;
        font-size: 0.7rem;
      }

      .members-section {
        margin-bottom: 15px;
        padding: 10px;
      }

      .members-section h3 {
        font-size: 0.9rem;
        margin-bottom: 8px;
      }

      .member {
        padding: 4px 8px;
        font-size: 0.75rem;
      }

      .messages {
        height: 120px;
        padding: 8px;
        font-size: 0.8rem;
      }

      .message-form {
        gap: 6px;
      }

      .message-form__input,
      .message-form__button {
        font-size: 0.85rem;
        padding: 7px 8px;
      }
    }
  </style>
</head>

<body>
  <main>
    <header>
      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Theme">☀️</button>
      <img src="assets/logo.svg" alt="App logo" style="height:60px;width:auto;" />
      <h1>Play-Off</h1>
      <p>Real-time Audio & Video Chat</p>
    </header>

  <!-- Chat Section -->
  <section class="chat-section">
    <h2>Live Chat & Video</h2>
    
    <!-- Video Container -->
    <div class="video-container">
      <div class="local-video-wrapper">
        <video id="local-video" autoplay muted playsinline></video>
        <div class="local-video-label">You</div>
      </div>
      <div id="remote-videos"></div>
    </div>

    <!-- Media Controls -->
    <div class="media-controls">
      <button id="toggle-camera">📷 Camera</button>
      <button id="toggle-microphone">🎤 Unmute</button>
      <button id="call-button">📞 Start Call</button>
      <button id="end-call-button" style="display:none;">📞 End</button>
      <button id="media-file-btn" style="background:#009688;">📁 Share File</button>
      <button id="share-room-button" style="background:#9C27B0;">🔗 Copy Room Link</button>
      <button id="share-clipboard-button" style="background:#E91E63;">📋 Share Clipboard</button>
      <span id="call-status"></span>
    </div>

    <!-- Members List -->
    <div class="members-section">
      <h3>Active Members (<span class="members-count">0</span>)</h3>
      <div class="members-list"></div>
    </div>

    <!-- Messages -->
    <div class="messages"></div>

    <!-- Message Form -->
    <form class="message-form" onsubmit="return false;">
      <button type="button" id="file-btn" class="emoji-btn" aria-label="Send File" title="Send a file or picture">📎</button>
      <input type="file" id="file-input" style="display:none;" />
      <button type="button" id="emoji-btn" class="emoji-btn" aria-label="Insert Emoji">😀</button>
      <input class="message-form__input" type="text" placeholder="Type a message or paste an image/GIF link..." />
      <button class="message-form__button" type="submit">Send</button>
      
      <!-- Emoji Picker Popover -->
      <div id="emoji-picker" class="emoji-picker hidden">
        <span>😀</span><span>😂</span><span>🤣</span><span>😍</span><span>🥺</span><span>👍</span><span>❤️</span><span>🔥</span><span>👏</span><span>🎉</span><span>😢</span><span>😎</span><span>🤔</span><span>🙌</span><span>✨</span><span>💯</span><span>🚀</span><span>💡</span><span>👀</span><span>✅</span>
      </div>
    </form>
    
    <footer style="text-align: center; margin-top: 20px; padding-top: 15px; border-top: 1px solid var(--panel-border); color: var(--text-muted); font-size: 0.85rem;">
      <p>Copyright &copy; 2026 Tomislav Blazevic. All Rights Reserved.</p>
      <p style="margin-top: 5px;">
        <a href="privacy.html" style="color: var(--text-main); text-decoration: none;">Privacy Policy</a> | 
        <a href="terms.html" style="color: var(--text-main); text-decoration: none;">Terms of Service</a>
      </p>
    </footer>
  </section>
  <script>
    // Theme toggle logic
    const themeToggle = document.getElementById('theme-toggle');
    const savedTheme = localStorage.getItem('theme');
    
    if (savedTheme === 'light') {
      document.body.classList.add('theme-light');
      themeToggle.textContent = '🌙';
    }

    themeToggle.addEventListener('click', () => {
      document.body.classList.toggle('theme-light');
      const isLight = document.body.classList.contains('theme-light');
      themeToggle.textContent = isLight ? '🌙' : '☀️';
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
    });
  </script>
  <script src="https://cdn.scaledrone.com/scaledrone.min.js"></script>
  <script src="https://webrtc.github.io/adapter/adapter-latest.js"></script>
  <script src="./dist/bundle.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').then(registration => {
          console.log('ServiceWorker registration successful with scope: ', registration.scope);
        }).catch(error => {
          console.log('ServiceWorker registration failed: ', error);
        });
      });
    }
  </script>
  </main>
</body>
</html>
